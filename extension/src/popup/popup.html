<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="settings.css">
  <title>Smart Lorem Ipsum</title>
</head>
<body>
  <div id="app">
    <!-- Main View -->
    <div id="main-view">
      <header class="header">
        <div class="header-left">
          <span class="header-icon">⚡</span>
          <h1 class="header-title">Smart Lorem Ipsum</h1>
        </div>
        <button id="btn-settings" class="btn-icon" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M7.5 2.25L7.94 0.75H10.06L10.5 2.25L12.18 3.22L13.68 2.72L14.78 4.63L13.68 5.85L13.68 7.15L14.78 8.37L13.68 10.28L12.18 9.78L10.5 10.75L10.06 12.25H7.94L7.5 10.75L5.82 9.78L4.32 10.28L3.22 8.37L4.32 7.15V5.85L3.22 4.63L4.32 2.72L5.82 3.22L7.5 2.25Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            <circle cx="9" cy="6.5" r="2" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
      </header>

      <main class="main">
        <section class="section">
          <label class="section-label">Generate</label>
          <div class="tabs" role="tablist">
            <button class="tab active" data-unit="paragraphs" role="tab" aria-selected="true">¶ Paragraphs</button>
            <button class="tab" data-unit="sentences" role="tab" aria-selected="false">⏤ Sentences</button>
            <button class="tab" data-unit="words" role="tab" aria-selected="false">Aa Words</button>
          </div>
        </section>

        <section class="section">
          <label class="section-label" for="count-input">Count</label>
          <div class="count-control">
            <button id="btn-dec" class="btn-count" aria-label="Decrease">−</button>
            <input id="count-input" type="number" value="3" min="1" max="99">
            <button id="btn-inc" class="btn-count" aria-label="Increase">+</button>
          </div>
        </section>

        <section class="section checkboxes">
          <label class="checkbox-label">
            <input type="checkbox" id="chk-lorem" checked>
            <span>Start with "Lorem ipsum..."</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="chk-html">
            <span>Wrap in HTML tags</span>
          </label>
          <div id="html-tag-row" class="html-tag-row hidden">
            <label class="section-label" for="select-tag">Tag</label>
            <select id="select-tag">
              <option value="p">&lt;p&gt;</option>
              <option value="li">&lt;li&gt;</option>
              <option value="h1">&lt;h1&gt;</option>
              <option value="h2">&lt;h2&gt;</option>
              <option value="h3">&lt;h3&gt;</option>
            </select>
          </div>
        </section>

        <section class="section">
          <textarea id="preview" class="preview" readonly></textarea>
        </section>

        <section class="presets-row">
          <button class="preset-btn" data-index="0">1¶</button>
          <button class="preset-btn" data-index="1">3¶</button>
          <button class="preset-btn" data-index="2">50w</button>
          <button id="btn-save-preset" class="preset-btn preset-save" aria-label="Save preset">+</button>
        </section>

        <button id="btn-copy" class="btn-primary">
          <span class="btn-copy-text">Copy to Clipboard</span>
        </button>

        <div class="status-bar">
          <span id="status-msg" class="status-msg"></span>
          <span id="word-count" class="word-count"></span>
        </div>

        <div class="popup-footer">
          <a id="link-rate" href="#" class="footer-link" title="Rate on Chrome Web Store">
            <span class="stars">★★★★★</span> Rate Us
          </a>
          <span class="footer-sep">·</span>
          <a id="link-coffee" href="#" class="footer-link" title="Support development">
            ☕ Buy me a coffee
          </a>
        </div>
      </main>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="hidden">
      <header class="header">
        <button id="btn-back" class="btn-icon" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="header-title">Settings</h1>
        <div style="width:30px"></div>
      </header>

      <div class="settings-body">
        <div class="setting-group">
          <label class="section-label">Theme</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="theme" value="auto" checked>
              <span>Auto</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="theme" value="light">
              <span>Light</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="theme" value="dark">
              <span>Dark</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <label class="section-label">Auto-copy on generate</label>
          <label class="toggle-label">
            <input type="checkbox" id="chk-autocopy">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="section-label">Keyboard shortcut</label>
          <div class="shortcut-display">
            <kbd>Ctrl+Shift+L</kbd>
            <a id="link-shortcuts" href="#" class="settings-link">Change in Chrome</a>
          </div>
        </div>

        <div class="setting-group">
          <label class="section-label">Reset</label>
          <button id="btn-reset" class="btn-secondary">Reset all settings</button>
        </div>
      </div>
    </div>

    <!-- Save preset modal -->
    <div id="preset-modal" class="modal-overlay hidden">
      <div class="modal">
        <h2 class="modal-title">Save Preset</h2>
        <p class="modal-desc">Replace an existing slot with current settings.</p>
        <label class="section-label">Replace</label>
        <div class="slot-picker" id="slot-picker">
          <label class="slot-option"><input type="radio" name="slot" value="0" checked><span class="slot-label" data-slot="0"></span></label>
          <label class="slot-option"><input type="radio" name="slot" value="1"><span class="slot-label" data-slot="1"></span></label>
          <label class="slot-option"><input type="radio" name="slot" value="2"><span class="slot-label" data-slot="2"></span></label>
        </div>
        <label class="section-label" for="preset-label-input">New label</label>
        <input id="preset-label-input" type="text" class="text-input" maxlength="6" placeholder="e.g. 5¶">
        <div class="modal-actions">
          <button id="btn-modal-cancel" class="btn-secondary">Cancel</button>
          <button id="btn-modal-save" class="btn-primary btn-sm">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../dist/popup/popup.js"></script>
</body>
</html>
